[features]
multi_agent = true

[agents]
max_threads = 6
max_depth = 1

[agents.orchestrator]
description = "Lead agent for cross-cutting Android TV tasks that span providers, playback, settings, releases, and device verification."
config_file = "agents/orchestrator.toml"

[agents.reviewer]
description = "Review-focused agent for correctness, regressions, runtime risks, release readiness, and missing tests."
config_file = "agents/reviewer.toml"
