name: Build APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.1)'
        required: true
        default: '1.0.0'
      release_notes:
        description: 'What changed in this release'
        required: true
        default: 'Bug fixes and improvements'

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Prepare CI signing config
        run: |
          mkdir -p signing app/signing
          keytool -genkeypair \
            -storetype PKCS12 \
            -keystore app/signing/legacy.jks \
            -storepass android \
            -keypass android \
            -alias ci \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -dname "CN=AerialViews Plus, OU=CI, O=GitHub, L=NA, S=NA, C=US"
          cat > signing/legacy.properties <<'EOF'
          storeFile=signing/legacy.jks
          storePassword=android
          keyAlias=ci
          keyPassword=android
          EOF

      - name: Build GitHub release APK
        run: ./gradlew --no-daemon :app:assembleGithubRelease

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/github/release/*.apk \
             dist/AerialViews-Plus-v${{ github.event.inputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: AerialViews+ v${{ github.event.inputs.version }}
          body: |
            ## What's changed
            ${{ github.event.inputs.release_notes }}

            ## Installation
            1. Download the APK below
            2. Enable "Install unknown apps" on your Android TV
            3. Install via file manager or ADB:
               `adb install -r AerialViews-Plus-v${{ github.event.inputs.version }}.apk`

            ## Notes
            - Sideload only — not for Google Play Store
            - If YouTube stops working, check NewPipe Extractor releases
            - Source code: github.com/naveeneppalapally/AerialViews-Plus

            **Full source:** https://github.com/naveeneppalapally/AerialViews-Plus
          files: dist/*.apk
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
