name: Build APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Prepare CI signing config
        run: |
          mkdir -p signing
          keytool -genkeypair \
            -storetype PKCS12 \
            -keystore signing/legacy.jks \
            -storepass android \
            -keypass android \
            -alias ci \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -dname "CN=AerialViews Extended, OU=CI, O=GitHub, L=NA, S=NA, C=US"
          cat > signing/legacy.properties <<'EOF'
          storeFile=signing/legacy.jks
          storePassword=android
          keyAlias=ci
          keyPassword=android
          EOF

      - name: Build GitHub release APK
        run: ./gradlew --no-daemon :app:assembleGithubNonMinifiedRelease

      - name: Get date
        id: date
        run: |
          echo "DATE=$(date -u +%Y.%m.%d)" >> "$GITHUB_OUTPUT"

      - name: Check if release exists
        id: check
        run: |
          EXISTS=$(gh release view v${{ steps.date.outputs.DATE }} \
            --repo naveeneppalapally/AerialViews-Extended 2>/dev/null \
            && echo "true" || echo "false")
          echo "EXISTS=$EXISTS" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename APK
        run: |
          cd app/build/outputs/apk/github/nonMinifiedRelease/
          mv app-github-nonMinifiedRelease.apk \
             AerialViews-Extended-v${{ steps.date.outputs.DATE }}.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: AerialViews-Extended-v${{ steps.date.outputs.DATE }}
          path: app/build/outputs/apk/github/nonMinifiedRelease/*.apk

      - name: Create Release
        if: steps.check.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.date.outputs.DATE }}
          name: AerialViews Extended v${{ steps.date.outputs.DATE }}
          files: app/build/outputs/apk/github/nonMinifiedRelease/*.apk
          generate_release_notes: true
          overwrite_files: true
